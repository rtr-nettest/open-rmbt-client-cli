name: Build RMBT Client CLI

on: [push]

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Java: shaded JAR (platform-independent, built once)
  # ─────────────────────────────────────────────────────────────────────────────
  java-jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build shaded JAR
        run: mvn -f clientJava/pom.xml package -DskipTests

      - uses: actions/upload-artifact@v4
        with:
          name: rmbt-client-jar
          path: |
            clientJava/target/rmbt-client-*.jar
            !clientJava/target/original-*.jar
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # Rust: static musl binaries for Linux; native for macOS and Windows
  # ─────────────────────────────────────────────────────────────────────────────
  rust:
    name: Rust / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — statically linked musl binaries run on all distros
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: linux-x64
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            name: linux-arm64
            use_cross: true
          # macOS — native per architecture
          - os: macos-13
            target: x86_64-apple-darwin
            name: macos-x64
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
            use_cross: false
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64
            use_cross: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            clientRust/target
          key: rust-${{ matrix.target }}-${{ hashFiles('clientRust/Cargo.lock', 'clientRust/Cargo.toml') }}
          restore-keys: rust-${{ matrix.target }}-

      - name: Install musl-tools (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Cache cross binary
        if: matrix.use_cross == true
        id: cache-cross
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cross
          key: cross-stable-v1

      - name: Install cross
        if: matrix.use_cross == true && steps.cache-cross.outputs.cache-hit != 'true'
        run: cargo install cross

      - name: Build (native)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }} --manifest-path clientRust/Cargo.toml

      - name: Build (cross — Docker-based)
        if: matrix.use_cross == true
        working-directory: clientRust
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp clientRust/target/${{ matrix.target }}/release/rmbt-client dist/
          cd dist && zip rmbt-client-rust-${{ matrix.name }}.zip rmbt-client

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item "clientRust\target\${{ matrix.target }}\release\rmbt-client.exe" dist\
          Compress-Archive -Path dist\rmbt-client.exe -DestinationPath dist\rmbt-client-rust-${{ matrix.name }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: rust-${{ matrix.name }}
          path: dist/rmbt-client-rust-${{ matrix.name }}.zip
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # C client: platform-native toolchains; Linux arm64 via cross-compilation
  # ─────────────────────────────────────────────────────────────────────────────
  c:
    name: C / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            cross: false
          - os: ubuntu-latest
            name: linux-arm64
            cross: true
          - os: macos-13
            name: macos-x64
            cross: false
          - os: macos-latest
            name: macos-arm64
            cross: false
          - os: windows-latest
            name: windows-x64
            cross: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Linux x64 ─────────────────────────────────────────────────────────
      - name: Install deps (Linux x64)
        if: matrix.os == 'ubuntu-latest' && !matrix.cross
        run: sudo apt-get install -y libcurl4-openssl-dev libssl-dev

      - name: Build (Linux x64)
        if: matrix.os == 'ubuntu-latest' && !matrix.cross
        run: make -C clientC

      # ── Linux arm64 cross-compile ──────────────────────────────────────────
      - name: Install cross-compile toolchain + arm64 libs
        if: matrix.os == 'ubuntu-latest' && matrix.cross
        run: |
          sudo dpkg --add-architecture arm64
          # Restrict existing sources to amd64; add arm64 from ports mirror
          CODENAME=$(lsb_release -cs)
          sudo sed -i 's/^deb http/deb [arch=amd64] http/g' /etc/apt/sources.list
          sudo sed -i 's/^deb mirror/deb [arch=amd64] mirror/g' /etc/apt/sources.list
          printf "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports %s main restricted universe multiverse\n" \
            "$CODENAME" "$CODENAME-updates" \
            | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            libcurl4-openssl-dev:arm64 \
            libssl-dev:arm64

      - name: Build (Linux arm64)
        if: matrix.os == 'ubuntu-latest' && matrix.cross
        env:
          CC: aarch64-linux-gnu-gcc
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_LIBDIR: /usr/lib/aarch64-linux-gnu/pkgconfig
        run: make -C clientC

      # ── macOS ──────────────────────────────────────────────────────────────
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install curl openssl@3 pkg-config

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          OPENSSL="$(brew --prefix openssl@3)/lib/pkgconfig"
          CURL="$(brew --prefix curl)/lib/pkgconfig"
          PKG_CONFIG_PATH="$CURL:$OPENSSL" make -C clientC

      # ── Windows via MSYS2/UCRT64 ────────────────────────────────────────────
      - uses: msys2/setup-msys2@v2
        if: runner.os == 'Windows'
        with:
          msystem: UCRT64
          update: true
          install: >-
            make
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-pkg-config

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make -C clientC

      # ── Package ────────────────────────────────────────────────────────────
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp clientC/build/rmbt-client dist/
          cd dist && zip rmbt-client-c-${{ matrix.name }}.zip rmbt-client

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item "clientC\build\rmbt-client.exe" dist\
          Compress-Archive -Path dist\rmbt-client.exe -DestinationPath dist\rmbt-client-c-${{ matrix.name }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: c-${{ matrix.name }}
          path: dist/rmbt-client-c-${{ matrix.name }}.zip
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # Java native images via jpackage — bundles a JRE, one per platform
  # (Linux arm64 skipped: no free GitHub-hosted arm64 Linux runner)
  # ─────────────────────────────────────────────────────────────────────────────
  java-native:
    name: Java native / ${{ matrix.name }}
    needs: java-jar
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
          - os: macos-13
            name: macos-x64
          - os: macos-latest
            name: macos-arm64
          - os: windows-latest
            name: windows-x64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: rmbt-client-jar
          path: jar-input

      - name: Compute app version
        id: ver
        shell: bash
        run: |
          INITIAL=$(git rev-list --max-parents=0 HEAD)
          echo "count=$(git rev-list --count ${INITIAL}..HEAD)" >> $GITHUB_OUTPUT

      - name: Locate JAR name
        id: jar
        shell: bash
        run: |
          name=$(find jar-input -name 'rmbt-client-*.jar' ! -name 'original-*' -printf '%f\n' | head -1)
          echo "name=$name" >> $GITHUB_OUTPUT

      - name: Create app image (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p jpackage-out
          jpackage \
            --input jar-input \
            --name rmbt-client \
            --main-jar "${{ steps.jar.outputs.name }}" \
            --main-class at.rtr.rmbt.client.Main \
            --type app-image \
            --app-version "1.0.${{ steps.ver.outputs.count }}" \
            --vendor "RTR" \
            --dest jpackage-out

      - name: Create app image (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force jpackage-out
          jpackage `
            --input jar-input `
            --name rmbt-client `
            --main-jar "${{ steps.jar.outputs.name }}" `
            --main-class at.rtr.rmbt.client.Main `
            --type app-image `
            --app-version "1.0.${{ steps.ver.outputs.count }}" `
            --vendor RTR `
            --dest jpackage-out

      - name: Zip image (Linux)
        if: runner.os == 'Linux'
        run: |
          cd jpackage-out
          zip -r rmbt-client-java-${{ matrix.name }}.zip rmbt-client

      - name: Zip image (macOS — .app bundle)
        if: runner.os == 'macOS'
        run: |
          cd jpackage-out
          zip -r rmbt-client-java-${{ matrix.name }}.zip rmbt-client.app

      - name: Zip image (Windows)
        if: runner.os == 'Windows'
        run: |
          Set-Location jpackage-out
          Compress-Archive -Path rmbt-client -DestinationPath rmbt-client-java-${{ matrix.name }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: java-${{ matrix.name }}
          path: jpackage-out/rmbt-client-java-${{ matrix.name }}.zip
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # Source archive
  # ─────────────────────────────────────────────────────────────────────────────
  source-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create source archive
        run: git archive --format=zip --output=rmbt-client-cli-source.zip HEAD

      - uses: actions/upload-artifact@v4
        with:
          name: source
          path: rmbt-client-cli-source.zip
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # GitHub Release — only on tag push
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [java-jar, rust, c, java-native, source-zip]
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List assets
        run: find release-assets -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/rmbt-client-jar/*.jar
            release-assets/rust-linux-x64/*.zip
            release-assets/rust-linux-arm64/*.zip
            release-assets/rust-macos-x64/*.zip
            release-assets/rust-macos-arm64/*.zip
            release-assets/rust-windows-x64/*.zip
            release-assets/c-linux-x64/*.zip
            release-assets/c-linux-arm64/*.zip
            release-assets/c-macos-x64/*.zip
            release-assets/c-macos-arm64/*.zip
            release-assets/c-windows-x64/*.zip
            release-assets/java-linux-x64/*.zip
            release-assets/java-macos-x64/*.zip
            release-assets/java-macos-arm64/*.zip
            release-assets/java-windows-x64/*.zip
            release-assets/source/*.zip
          token: ${{ secrets.GITHUB_TOKEN }}

name: Build RMBT Client CLI

on: [push]

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Java: shaded JAR (platform-independent, built once)
  # ─────────────────────────────────────────────────────────────────────────────
  java-jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build shaded JAR
        run: mvn -f clientJava/pom.xml package -DskipTests

      - uses: actions/upload-artifact@v4
        with:
          name: rmbt-client-jar
          path: clientJava/target/rmbt-client.jar
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # Rust: static musl for Linux; native/cross for macOS; MSVC for Windows
  # macos-latest is now Apple Silicon (arm64); x64 cross-compiles cleanly via Rust.
  # ─────────────────────────────────────────────────────────────────────────────
  rust:
    name: Rust / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: linux-x64
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            name: linux-arm64
            use_cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64
            use_cross: false
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macos-x64
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64
            use_cross: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            clientRust/target
          key: rust-${{ matrix.target }}-${{ hashFiles('clientRust/Cargo.lock', 'clientRust/Cargo.toml') }}
          restore-keys: rust-${{ matrix.target }}-

      - name: Install musl-tools (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Cache cross binary
        if: matrix.use_cross == true
        id: cache-cross
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cross
          key: cross-stable-v1

      - name: Install cross
        if: matrix.use_cross == true && steps.cache-cross.outputs.cache-hit != 'true'
        run: cargo install cross

      - name: Build (native)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }} --manifest-path clientRust/Cargo.toml

      - name: Build (cross — Docker-based)
        if: matrix.use_cross == true
        working-directory: clientRust
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp clientRust/target/${{ matrix.target }}/release/rmbt-client dist/
          cd dist && zip rmbt-client-rust-${{ matrix.name }}.zip rmbt-client

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item "clientRust\target\${{ matrix.target }}\release\rmbt-client.exe" dist\
          Compress-Archive -Path dist\rmbt-client.exe -DestinationPath dist\rmbt-client-rust-${{ matrix.name }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: rust-${{ matrix.name }}
          path: dist/rmbt-client-rust-${{ matrix.name }}.zip
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # C client: Linux x64 (native), Linux arm64 (QEMU Docker), macOS arm64 (native)
  # Windows is not supported: the C client uses POSIX socket APIs (sys/socket.h,
  # netdb.h, etc.) that have no Windows equivalent without major refactoring.
  # macOS x64 is not built separately: the arm64 binary runs on Intel Macs via Rosetta.
  # ─────────────────────────────────────────────────────────────────────────────
  c:
    name: C / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            docker_platform: ""
          - name: linux-arm64
            docker_platform: linux/arm64
          - name: macos-arm64
            docker_platform: ""

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── macOS arm64 — runs on a separate macOS runner ──────────────────────
      # We can't run macOS in Docker, so we special-case it with a conditional.
      # GitHub does not allow per-matrix `runs-on`, so we gate the macOS build
      # here and skip it on the Linux runner.

      # ── Linux x64 native ──────────────────────────────────────────────────
      - name: Install deps (Linux x64)
        if: matrix.name == 'linux-x64'
        run: sudo apt-get install -y libcurl4-openssl-dev libssl-dev

      - name: Build (Linux x64)
        if: matrix.name == 'linux-x64'
        run: make -C clientC

      # ── Linux arm64 via QEMU Docker (avoids fragile apt multiarch) ─────────
      - uses: docker/setup-qemu-action@v3
        if: matrix.name == 'linux-arm64'

      - name: Build (Linux arm64 in Docker)
        if: matrix.name == 'linux-arm64'
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            ubuntu:latest \
            bash -c "
              apt-get update -qq &&
              apt-get install -y git gcc make libcurl4-openssl-dev libssl-dev &&
              make -C clientC
            "

      # ── Package ────────────────────────────────────────────────────────────
      - name: Package (Linux)
        if: matrix.name == 'linux-x64' || matrix.name == 'linux-arm64'
        run: |
          mkdir -p dist
          cp clientC/build/rmbt-client dist/
          cd dist && zip rmbt-client-c-${{ matrix.name }}.zip rmbt-client

      - uses: actions/upload-artifact@v4
        if: matrix.name == 'linux-x64' || matrix.name == 'linux-arm64'
        with:
          name: c-${{ matrix.name }}
          path: dist/rmbt-client-c-${{ matrix.name }}.zip
          retention-days: 90

  # macOS C build runs on its own job (matrix runs-on workaround)
  c-macos:
    name: C / macos-arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps
        run: brew install curl openssl@3 pkg-config

      - name: Build
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix curl)/lib/pkgconfig:$(brew --prefix openssl@3)/lib/pkgconfig"
          make -C clientC

      - name: Package
        run: |
          mkdir -p dist
          cp clientC/build/rmbt-client dist/
          cd dist && zip rmbt-client-c-macos-arm64.zip rmbt-client

      - uses: actions/upload-artifact@v4
        with:
          name: c-macos-arm64
          path: dist/rmbt-client-c-macos-arm64.zip
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # Java native images via jpackage — bundles a JRE per platform
  # ─────────────────────────────────────────────────────────────────────────────
  java-native:
    name: Java native / ${{ matrix.name }}
    needs: java-jar
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
          - os: macos-latest
            name: macos-arm64
          - os: windows-latest
            name: windows-x64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: rmbt-client-jar
          path: jar-input

      - name: Compute app version
        id: ver
        shell: bash
        run: |
          INITIAL=$(git rev-list --max-parents=0 HEAD)
          echo "count=$(git rev-list --count ${INITIAL}..HEAD)" >> $GITHUB_OUTPUT

      - name: Locate JAR name
        id: jar
        shell: bash
        run: |
          path=$(find jar-input -name 'rmbt-client-*.jar' ! -name 'original-*' | head -1)
          echo "name=$(basename "$path")" >> $GITHUB_OUTPUT

      - name: Create app image (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p jpackage-out
          jpackage \
            --input jar-input \
            --name rmbt-client \
            --main-jar "${{ steps.jar.outputs.name }}" \
            --main-class at.rtr.rmbt.client.Main \
            --type app-image \
            --app-version "1.0.${{ steps.ver.outputs.count }}" \
            --vendor "RTR" \
            --dest jpackage-out

      - name: Create app image (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force jpackage-out
          jpackage `
            --input jar-input `
            --name rmbt-client `
            --main-jar "${{ steps.jar.outputs.name }}" `
            --main-class at.rtr.rmbt.client.Main `
            --type app-image `
            --app-version "1.0.${{ steps.ver.outputs.count }}" `
            --vendor RTR `
            --dest jpackage-out

      - name: Zip image (Linux)
        if: runner.os == 'Linux'
        run: cd jpackage-out && zip -r rmbt-client-java-${{ matrix.name }}.zip rmbt-client

      - name: Zip image (macOS — .app bundle)
        if: runner.os == 'macOS'
        run: cd jpackage-out && zip -r rmbt-client-java-${{ matrix.name }}.zip rmbt-client.app

      - name: Zip image (Windows)
        if: runner.os == 'Windows'
        run: |
          Set-Location jpackage-out
          Compress-Archive -Path rmbt-client -DestinationPath rmbt-client-java-${{ matrix.name }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: java-${{ matrix.name }}
          path: jpackage-out/rmbt-client-java-${{ matrix.name }}.zip
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # Source archive
  # ─────────────────────────────────────────────────────────────────────────────
  source-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create source archive
        run: git archive --format=zip --output=rmbt-client-cli-source.zip HEAD

      - uses: actions/upload-artifact@v4
        with:
          name: source
          path: rmbt-client-cli-source.zip
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # GitHub Release — only on tag push
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [java-jar, rust, c, c-macos, java-native, source-zip]
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List assets
        run: find release-assets -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/rmbt-client-jar/*.jar
            release-assets/rust-linux-x64/*.zip
            release-assets/rust-linux-arm64/*.zip
            release-assets/rust-macos-arm64/*.zip
            release-assets/rust-macos-x64/*.zip
            release-assets/rust-windows-x64/*.zip
            release-assets/c-linux-x64/*.zip
            release-assets/c-linux-arm64/*.zip
            release-assets/c-macos-arm64/*.zip
            release-assets/java-linux-x64/*.zip
            release-assets/java-macos-arm64/*.zip
            release-assets/java-windows-x64/*.zip
            release-assets/source/*.zip
          token: ${{ secrets.GITHUB_TOKEN }}
